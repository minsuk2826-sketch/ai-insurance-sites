<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>전체 보험사 비교견적 상담</title>
  <meta name="description" content="전체 보험사 비교견적으로 고객에게 더 적합한 보험 상품을 제안합니다.">
  <meta name="theme-color" content="#FEE500">
  <meta property="og:title" content="전체 보험사 비교견적 상담">
  <meta property="og:description" content="한 회사만이 아닌 전체 보험사를 비교해보세요.">
  <meta property="og:image" content="/landing-main.png">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="page">
    <img class="main-image" src="./landing-main.png" alt="전체 보험사 비교견적 안내">

    <section class="real-form" id="consult">
      <div class="form-heading">
        <p>비교가 다르면 결과도 달라집니다.</p>
        <h1>지금 바로 <em>상담문의</em> 주세요!</h1>
        <span>전체 보험사 비교견적으로 고객 만족과 상담 경쟁력을 높여보세요.</span>
      </div>

      <form id="leadForm">
        <label>이름
          <input name="name" type="text" placeholder="이름을 입력해주세요" required>
        </label>

        <label>연락처
          <input name="phone" type="tel" inputmode="numeric" placeholder="- 없이 숫자만 입력해주세요" required>
        </label>

        <label>상담 희망 시간
          <select name="preferred_time" required>
            <option value="">선택해주세요</option>
            <option>오전 9시~12시</option>
            <option>오후 12시~3시</option>
            <option>오후 3시~6시</option>
            <option>저녁 6시 이후</option>
          </select>
        </label>

        <label>문의 내용 <small>(선택)</small>
          <textarea name="message" placeholder="문의 내용을 입력해주세요"></textarea>
        </label>

        <label class="agree">
          <input type="checkbox" required>
          <span>개인정보 수집 및 상담 연락에 동의합니다.</span>
        </label>

        <button type="submit">무료 상담 신청하기</button>
        <a id="kakaoBtn" class="kakao" href="#" target="_blank" rel="noopener">카카오톡으로 빠르게 상담하기</a>
        <p class="note">남겨주신 정보는 상담 목적 외에는 사용되지 않습니다.</p>
      </form>
    </section>
  </main>

  <nav class="sticky">
    <a href="#consult">상담 신청</a>
    <a id="stickyKakao" href="#" target="_blank" rel="noopener">카카오 상담</a>
  </nav>

  <div id="complete" class="complete">
    <div class="complete-card">
      <div class="check">✓</div>
      <h2>접수가 완료되었습니다.</h2>
      <p>전문 상담사가 확인 후 빠르게 연락드리겠습니다.</p>
      <button id="closeComplete" type="button">확인</button>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
