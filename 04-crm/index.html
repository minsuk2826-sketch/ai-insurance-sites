<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI보험 CRM 2.0</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--blue:#1769ff;--blue2:#0e52d8;--navy:#14213a;--muted:#6c7890;--line:#dfe8f5;--soft:#f5f9ff;--white:#fff;--green:#1aa36f;--orange:#f59e0b;--red:#e44848;--shadow:0 14px 40px rgba(48,88,145,.10)}
    *{box-sizing:border-box} body{margin:0;font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",Arial,sans-serif;background:var(--soft);color:var(--navy)}
    button,input,select,textarea{font:inherit} button{cursor:pointer}
    .hidden{display:none!important} .wrap{max-width:1280px;margin:auto;padding:22px 18px 60px}
    header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
    .top{max-width:1280px;margin:auto;height:64px;padding:0 18px;display:flex;align-items:center;justify-content:space-between}
    .brand{font-weight:900;font-size:22px} .brand b{color:var(--blue)} .btn{border:0;border-radius:12px;padding:11px 15px;font-weight:800}
    .primary{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff} .light{background:#eef4ff;color:#24477f} .danger{background:#fff0f0;color:#b52d2d}
    .login-screen{min-height:100vh;display:grid;place-items:center;padding:20px;background:linear-gradient(180deg,#f7fbff,#edf5ff)}
    .login-card{width:min(420px,100%);background:#fff;border:1px solid var(--line);border-radius:24px;padding:30px;box-shadow:var(--shadow)}
    .login-card h1{margin:0 0 8px} .login-card p{margin:0 0 20px;color:var(--muted)} .field{display:grid;gap:6px;margin-bottom:12px}
    input,select,textarea{width:100%;border:1px solid #d7e1ef;border-radius:12px;padding:11px 12px;outline:none;background:#fff}
    input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(23,105,255,.09)} textarea{min-height:90px;resize:vertical}
    .msg{margin-top:12px;padding:11px;border-radius:10px;font-size:14px;font-weight:700}
    .title-row{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;margin-bottom:20px} h1{font-size:30px;margin:0} .sub{color:var(--muted);margin-top:6px}
    .stats{display:grid;grid-template-columns:repeat(7,1fr);gap:14px;margin-bottom:20px} .stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow)}
    .stat small{color:var(--muted);font-weight:800} .stat strong{display:block;font-size:30px;margin-top:6px}
    .layout{display:grid;grid-template-columns:1fr 360px;gap:18px} .panel{background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow)}
    .panel-head{padding:18px;border-bottom:1px solid var(--line)} .panel-head h2{margin:0;font-size:20px}
    .filters{display:grid;grid-template-columns:1.5fr repeat(3,1fr);gap:10px;margin-top:14px}
    .table-wrap{overflow:auto} table{width:100%;border-collapse:collapse;min-width:1120px} th,td{padding:13px 14px;border-bottom:1px solid #edf2f8;text-align:left;font-size:14px}
    th{background:#fbfdff;color:#56647d;font-size:13px} tr:hover td{background:#fafcff} .status{display:inline-flex;padding:6px 9px;border-radius:999px;font-size:12px;font-weight:900}
    .신규{background:#eaf2ff;color:#1757b8} .연락완료{background:#eefaf6;color:#137a55} .분석대기{background:#fff7e6;color:#a76600} .분석진행{background:#f0edff;color:#6847c5}
    .제안중{background:#fff0f0;color:#b73838} .계약완료{background:#e9f8ef;color:#167347} .보류{background:#f0f2f5;color:#596273}
    .empty{padding:44px;text-align:center;color:var(--muted)} .side{padding:18px} .side h2{margin:0 0 14px;font-size:20px} .form-grid{display:grid;gap:10px}
    .two{display:grid;grid-template-columns:1fr 1fr;gap:10px} label{font-size:13px;font-weight:800;color:#59677f} .form-actions{display:flex;gap:8px;margin-top:6px} .form-actions .btn{flex:1}
    .actions-cell{display:flex;gap:6px}
    .select-col{width:44px;text-align:center}
    .row-check,.select-all{width:18px;height:18px;cursor:pointer}
    tr.selected-row td{background:#e8f1ff!important}
    .pagination{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px;border-top:1px solid var(--line)}
    .page-btn{min-width:38px;height:38px;border:1px solid var(--line);border-radius:10px;background:#fff;color:#334766;font-weight:800;cursor:pointer}
    .page-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
    .page-btn:disabled{opacity:.45;cursor:not-allowed}
    .selected-count{font-size:13px;color:#4c5d76;font-weight:800;margin-left:8px} .icon-btn{border:0;background:#eef4ff;color:#24477f;border-radius:9px;padding:7px 9px;font-weight:800} .icon-btn.del{background:#fff0f0;color:#b52d2d}

    .bulk-tools{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:12px}
    .bulk-tools .btn{padding:10px 13px}
    .today-active{outline:3px solid rgba(23,105,255,.18)}
    .money{font-variant-numeric:tabular-nums}
    .copy-note{font-size:12px;color:var(--muted)}
    .stat-filter{cursor:pointer;transition:.18s ease;user-select:none}
    .stat-filter:hover{transform:translateY(-2px);box-shadow:0 18px 36px rgba(48,88,145,.16)}
    .stat-filter.active{border:2px solid var(--blue);background:#eef5ff}

    .consult-modal{position:fixed;inset:0;z-index:100;background:rgba(17,30,52,.48);display:none;align-items:center;justify-content:center;padding:18px}
    .consult-modal.open{display:flex}
    .consult-card{width:min(900px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:24px;box-shadow:0 24px 70px rgba(20,33,58,.28)}
    .consult-head{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:2}
    .consult-head h2{margin:0;font-size:24px}
    .consult-close{width:42px;height:42px;border:0;border-radius:50%;background:#eef4ff;font-size:28px;line-height:1}
    .consult-body{padding:20px}
    .customer-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
    .summary-box{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fbfdff}
    .summary-box small{display:block;color:var(--muted);font-weight:800;margin-bottom:4px}
    .history-list{display:grid;gap:10px;margin:14px 0 18px}
    .history-item{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff}
    .history-item .time{font-size:12px;color:var(--muted);font-weight:800;margin-bottom:7px}
    .history-item .content{white-space:pre-wrap;line-height:1.65}
    .history-item-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .history-actions{display:flex;gap:6px}
    .history-btn{border:0;border-radius:8px;padding:6px 9px;font-size:12px;font-weight:800;cursor:pointer}
    .history-btn.edit{background:#eef4ff;color:#24477f}
    .history-btn.delete{background:#fff0f0;color:#b52d2d}
    .consult-follow-box{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end;margin:0 0 18px;padding:14px;border:1px solid var(--line);border-radius:14px;background:#fbfdff}
    .consult-follow-box .field{margin:0}
    @media(max-width:520px){.consult-follow-box{grid-template-columns:1fr}}
    .history-empty{padding:28px;text-align:center;color:var(--muted);background:#f8fbff;border-radius:14px}
    .consult-input{display:grid;gap:10px;border-top:1px solid var(--line);padding-top:18px}
    .consult-input textarea{min-height:130px}
    .consult-actions{display:flex;justify-content:flex-end;gap:8px}
    tr.customer-row{cursor:pointer}
    tr.customer-row:hover td{background:#f2f7ff}
    @media(max-width:700px){.customer-summary{grid-template-columns:1fr 1fr}.consult-modal{padding:0}.consult-card{width:100%;height:100%;max-height:none;border-radius:0}}

    @media(max-width:1000px){.stats{grid-template-columns:repeat(2,1fr)}.layout{grid-template-columns:1fr}.filters{grid-template-columns:1fr 1fr}}
    @media(max-width:620px){.wrap{padding:18px 12px 50px}.top{padding:0 12px}.brand{font-size:18px}.title-row{align-items:flex-start;flex-direction:column}.stats{grid-template-columns:1fr 1fr}.filters{grid-template-columns:1fr}.two{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="loginScreen" class="login-screen">
  <form id="loginForm" class="login-card">
    <h1>AI보험 CRM 2.0</h1>
    <p>관리자 계정으로 로그인하세요.</p>
    <div class="field"><label>이메일</label><input id="loginEmail" type="email" required></div>
    <div class="field"><label>비밀번호</label><input id="loginPassword" type="password" required></div>
    <button class="btn primary" style="width:100%" type="submit">로그인</button>
    <div id="loginMsg" class="msg hidden"></div>
  </form>
</div>

<div id="app" class="hidden">
<header><div class="top"><div class="brand"><b>AI보험</b> CRM 2.0</div><button id="logoutBtn" class="btn light">로그아웃</button></div></header>
<main class="wrap">
  <div class="title-row"><div><h1>고객 관리 대시보드</h1><div class="sub">랜딩페이지 신청자가 자동으로 표시됩니다.</div></div><button class="btn primary" id="newBtn">+ 신규 고객 등록</button></div>
  <section class="stats">
    <div class="stat stat-filter" data-filter="all"><small>전체 고객</small><strong id="sTotal">0</strong></div>
    <div class="stat stat-filter" data-filter="new"><small>신규 문의</small><strong id="sNew">0</strong></div>
    <div class="stat stat-filter" data-filter="today"><small>오늘 연락 예정</small><strong id="sToday">0</strong></div>
    <div class="stat stat-filter" data-filter="analysis"><small>분석 진행</small><strong id="sAnalysis">0</strong></div>
    <div class="stat stat-filter" data-filter="done"><small>계약 완료</small><strong id="sDone">0</strong></div>
    <div class="stat"><small>이번 달 월보험료</small><strong id="sPremium" class="money">0원</strong></div>
    <div class="stat"><small>이번 달 수수료</small><strong id="sCommission" class="money">0원</strong></div>
  </section>

  <section class="layout">
    <div class="panel">
      <div class="panel-head"><h2>고객 목록</h2>
        <div class="filters">
          <input id="search" placeholder="이름 또는 전화번호 검색">
          <select id="statusFilter"><option value="">전체 상태</option><option>신규</option><option>연락완료</option><option>분석대기</option><option>분석진행</option><option>제안중</option><option>계약완료</option><option>보류</option></select>
          <select id="sourceFilter"><option value="">전체 유입경로</option></select>
          <select id="sortBy"><option value="createdDesc">최근 등록순</option><option value="followAsc">다음 연락일순</option><option value="nameAsc">이름순</option></select>
        </div>
        <div class="bulk-tools">
          <button type="button" class="btn light" id="todayBtn">오늘 연락 예정만 보기</button>
          <button type="button" class="btn primary" id="smsBtn">선택 고객 문자 보내기</button>
          <span class="copy-note">체크박스로 고객을 선택한 뒤 사용하세요.</span>
        </div>
      </div>
      <div class="table-wrap">
        <table><thead><tr>
          <th class="select-col"><input id="selectAll" class="select-all" type="checkbox" aria-label="현재 페이지 전체 선택"></th>
          <th>등록일</th><th>이름</th><th>연락처</th><th>유입경로</th><th>나이대</th><th>상태</th><th>상담 가능 시간</th><th>다음 연락일</th><th>계약일</th><th>월보험료</th><th>수수료</th><th>메모</th><th>관리</th>
        </tr></thead><tbody id="customerBody"></tbody></table>
        <div id="pagination" class="pagination"></div>
        <div id="emptyState" class="empty">등록된 고객이 없습니다.</div>
      </div>
    </div>

    <aside class="panel side">
      <h2 id="formTitle">신규 고객 등록</h2>
      <form id="customerForm" class="form-grid">
        <input type="hidden" id="customerId">
        <div class="two">
          <div class="field"><label>이름</label><input id="name" required></div>
          <div class="field"><label>휴대폰 번호</label><input id="phone" required></div>
        </div>
        <div class="field"><label>유입경로</label><select id="source"><option value="CRM">CRM 직접등록</option><option>AI보험점검 랜딩페이지</option><option>리크루팅랜딩페이지1</option><option>육아경단녀 랜딩페이지</option><option>랜딩페이지</option><option>카카오톡</option><option>전화</option><option>소개</option><option>기타</option></select></div>
        <div class="two">
          <div class="field"><label>나이대</label><select id="age"><option value="">선택</option><option>20대</option><option>30대</option><option>40대</option><option>50대</option><option>60대 이상</option></select></div>
          <div class="field"><label>상태</label><select id="status"><option>신규</option><option>연락완료</option><option>분석대기</option><option>분석진행</option><option>제안중</option><option>계약완료</option><option>보류</option></select></div>
        </div>
        <div class="field"><label>상담 가능 시간</label><input id="availableTime"></div>
        <div class="field"><label>다음 연락일</label><input id="followUp" type="date"></div>
        <div class="field"><label>관심 분야</label><input id="interest"></div>
        <div class="two">
          <div class="field"><label>계약일</label><input id="contractDate" type="date"></div>
          <div class="field"><label>월보험료</label><input id="monthlyPremium" type="number" min="0" step="1000" placeholder="예: 150000"></div>
        </div>
        <div class="field"><label>수수료</label><input id="commission" type="number" min="0" step="1000" placeholder="예: 1200000"></div>
        <div class="field"><label>상담 메모</label><textarea id="memo"></textarea></div>
        <div class="form-actions"><button class="btn light" type="button" id="cancelBtn">초기화</button><button class="btn primary" type="submit">저장하기</button></div>
      </form>
    </aside>
  </section>
</main>
</div>

<div id="consultModal" class="consult-modal" aria-hidden="true">
  <div class="consult-card" role="dialog" aria-modal="true" aria-labelledby="consultTitle">
    <div class="consult-head">
      <h2 id="consultTitle">고객 상담 기록</h2>
      <button type="button" id="consultClose" class="consult-close" aria-label="상담 기록 닫기">×</button>
    </div>
    <div class="consult-body">
      <div class="customer-summary">
        <div class="summary-box"><small>이름</small><strong id="consultName">-</strong></div>
        <div class="summary-box"><small>연락처</small><strong id="consultPhone">-</strong></div>
        <div class="summary-box"><small>상태</small><strong id="consultStatus">-</strong></div>
        <div class="summary-box"><small>다음 연락일</small><strong id="consultFollowUp">-</strong></div>
      </div>

      <div class="consult-follow-box">
        <div class="field">
          <label for="consultFollowUpInput">다음 연락일 지정</label>
          <input id="consultFollowUpInput" type="date">
        </div>
        <button type="button" class="btn primary" id="consultFollowUpSave">다음 연락일 저장</button>
      </div>

      <h3>상담 기록</h3>
      <div id="consultHistory" class="history-list"></div>

      <div class="consult-input">
        <label for="consultMemo">새 상담 내용</label>
        <textarea id="consultMemo" placeholder="통화 내용, 고객 요청사항, 다음 상담 계획 등을 입력해주세요."></textarea>
        <div class="consult-actions">
          <button type="button" class="btn light" id="consultCancel">닫기</button>
          <button type="button" class="btn primary" id="consultSave">상담 기록 저장</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const { createClient } = supabase;
const db = createClient('https://pzlxrlkvbrufhimyglyo.supabase.co', 'sb_publishable_WE6jk24ys0guHE1INCZv-w_cmd-HqOd');
let customers = [];
let currentPage = 1;
const pageSize = 10;
const selectedIds = new Set();
let todayOnly = false;
let activeStatsFilter = "all";
let activeConsultCustomerId = null;
let editingHistoryIndex = null;

const $ = id => document.getElementById(id);
const today = () => new Date().toISOString().slice(0,10);
const esc = s => String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));
const num = v => Number(v || 0);
const formatWon = v => Math.round(num(v)).toLocaleString("ko-KR") + "원";
const cleanPhone = v => String(v || "").replace(/[^0-9+]/g,"");


async function checkSession(){
  const {data} = await db.auth.getSession();
  if(data.session) showApp(); else showLogin();
}
function showLogin(){ $("loginScreen").classList.remove("hidden"); $("app").classList.add("hidden"); }
async function showApp(){ $("loginScreen").classList.add("hidden"); $("app").classList.remove("hidden"); await loadCustomers(); }

$("loginForm").addEventListener("submit", async e=>{
  e.preventDefault();
  const email=$("loginEmail").value.trim(), password=$("loginPassword").value;
  const {error} = await db.auth.signInWithPassword({email,password});
  const msg=$("loginMsg");
  if(error){msg.textContent="로그인에 실패했습니다. 이메일과 비밀번호를 확인하세요.";msg.classList.remove("hidden");msg.style.background="#fff0f0";msg.style.color="#b52d2d";}
  else{msg.classList.add("hidden");showApp();}
});
$("logoutBtn").addEventListener("click", async()=>{await db.auth.signOut();showLogin();});

async function loadCustomers(){
  const {data,error} = await db.from("customers").select("*").order("created_at",{ascending:false});
  if(error){alert("고객 목록을 불러오지 못했습니다: "+error.message);return}
  customers=data||[]; populateSourceFilter(); render();
}
function populateSourceFilter(){
  const select=$("sourceFilter");
  const current=select.value;
  const preferred=["AI보험점검 랜딩페이지","리크루팅랜딩페이지1","육아경단녀 랜딩페이지","랜딩페이지","CRM","카카오톡","전화","소개","기타"];
  const values=[...new Set(customers.map(c=>c.source).filter(Boolean))];
  values.sort((a,b)=>{const ai=preferred.indexOf(a),bi=preferred.indexOf(b);if(ai!==-1||bi!==-1)return (ai===-1?999:ai)-(bi===-1?999:bi);return a.localeCompare(b);});
  select.innerHTML='<option value="">전체 유입경로</option>'+values.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');
  if(values.includes(current)) select.value=current;
}
function getFilteredCustomers(){
  const q=$("search").value.trim().toLowerCase();
  const sf=$("statusFilter").value;
  const sourcef=$("sourceFilter").value;
  const sort=$("sortBy").value;

  let list=customers.filter(c=>
    (!q||(c.name||"").toLowerCase().includes(q)||(c.phone||"").includes(q)) &&
    (!sf||c.status===sf) &&
    (!sourcef||(c.source||"")===sourcef) &&
    (!todayOnly||c.follow_up_date===today()) &&
    (
      activeStatsFilter==="all" ||
      (activeStatsFilter==="new" && (c.status||"신규")==="신규") ||
      (activeStatsFilter==="today" && c.follow_up_date===today()) ||
      (activeStatsFilter==="analysis" && ["분석대기","분석진행"].includes(c.status)) ||
      (activeStatsFilter==="done" && c.status==="계약완료")
    )
  );

  if(sort==="createdDesc") list.sort((a,b)=>(b.created_at||"").localeCompare(a.created_at||""));
  if(sort==="followAsc") list.sort((a,b)=>(a.follow_up_date||"9999").localeCompare(b.follow_up_date||"9999"));
  if(sort==="nameAsc") list.sort((a,b)=>(a.name||"").localeCompare(b.name||""));
  return list;
}

function render(){
  const list=getFilteredCustomers();
  const totalPages=Math.max(1,Math.ceil(list.length/pageSize));
  if(currentPage>totalPages) currentPage=totalPages;
  if(currentPage<1) currentPage=1;

  const start=(currentPage-1)*pageSize;
  const pageList=list.slice(start,start+pageSize);

  $("customerBody").innerHTML=pageList.map(c=>{
    const checked=selectedIds.has(String(c.id));
    return `<tr class="customer-row ${checked?"selected-row":""}" data-customer-id="${esc(c.id)}">
      <td class="select-col"><input type="checkbox" class="row-check" data-id="${esc(c.id)}" ${checked?"checked":""}></td>
      <td>${esc((c.created_at||"").slice(0,10))}</td><td><b>${esc(c.name)}</b></td>
      <td><a href="tel:${esc(c.phone)}">${esc(c.phone)}</a></td><td>${esc(c.source||"-")}</td><td>${esc(c.age_group||"-")}</td>
      <td><span class="status ${esc(c.status||"신규")}">${esc(c.status||"신규")}</span></td>
      <td>${esc(c.available_time||"-")}</td><td>${esc(c.follow_up_date||"-")}</td>
      <td>${esc(c.contract_date||"-")}</td>
      <td class="money">${formatWon(c.monthly_premium)}</td>
      <td class="money">${formatWon(c.commission)}</td>
      <td title="${esc(c.memo||c.message||"")}">${esc((c.memo||c.message||"").slice(0,24))}</td>
      <td><div class="actions-cell">
        <button type="button" class="icon-btn" data-action="edit" data-id="${esc(c.id)}">수정</button>
        <button type="button" class="icon-btn del" data-action="delete" data-id="${esc(c.id)}">삭제</button>
      </div></td>
    </tr>`;
  }).join("");

  $("emptyState").style.display=list.length?"none":"block";
  $("sTotal").textContent=customers.length;
  $("sNew").textContent=customers.filter(c=>c.status==="신규").length;
  $("sToday").textContent=customers.filter(c=>c.follow_up_date===today()).length;
  $("sAnalysis").textContent=customers.filter(c=>["분석대기","분석진행"].includes(c.status)).length;
  $("sDone").textContent=customers.filter(c=>c.status==="계약완료").length;

  const month=today().slice(0,7);
  const thisMonthContracts=customers.filter(c=>(c.contract_date||"").slice(0,7)===month);
  $("sPremium").textContent=formatWon(thisMonthContracts.reduce((sum,c)=>sum+num(c.monthly_premium),0));
  $("sCommission").textContent=formatWon(thisMonthContracts.reduce((sum,c)=>sum+num(c.commission),0));

  renderPagination(totalPages);
  updateSelectAll(pageList);
}

function renderPagination(totalPages){
  const parts=[];
  parts.push(`<button type="button" class="page-btn" data-page="${currentPage-1}" ${currentPage===1?"disabled":""}>이전</button>`);
  for(let p=1;p<=totalPages;p++){
    parts.push(`<button type="button" class="page-btn ${p===currentPage?"active":""}" data-page="${p}">${p}</button>`);
  }
  parts.push(`<button type="button" class="page-btn" data-page="${currentPage+1}" ${currentPage===totalPages?"disabled":""}>다음</button>`);
  parts.push(`<span class="selected-count">선택 ${selectedIds.size}명</span>`);
  $("pagination").innerHTML=parts.join("");
}

function updateSelectAll(pageList){
  const selectAll=$("selectAll");
  const ids=pageList.map(c=>String(c.id));
  const selected=ids.filter(id=>selectedIds.has(id)).length;
  selectAll.checked=ids.length>0&&selected===ids.length;
  selectAll.indeterminate=selected>0&&selected<ids.length;
}

function clearForm(){$("customerForm").reset();$("customerId").value="";$("formTitle").textContent="신규 고객 등록";$("status").value="신규";$("source").value="CRM";}
function editCustomer(id){
  const c=customers.find(x=>String(x.id)===String(id));
  if(!c){alert("고객 정보를 찾지 못했습니다.");return;}
  $("customerId").value=c.id;
  $("name").value=c.name||"";
  $("phone").value=c.phone||"";
  $("age").value=c.age_group||"";
  $("status").value=c.status||"신규";
  $("source").value=c.source||"CRM";
  $("availableTime").value=c.available_time||"";
  $("followUp").value=c.follow_up_date||"";
  $("interest").value=c.interest||"";
  $("contractDate").value=c.contract_date||"";
  $("monthlyPremium").value=c.monthly_premium||"";
  $("commission").value=c.commission||"";
  $("memo").value=c.memo||c.message||"";
  $("formTitle").textContent="고객 정보 수정";
  document.querySelector(".side").scrollIntoView({behavior:"smooth",block:"start"});
}

function formatDateTime(value){
  if(!value)return "";
  const d=new Date(value);
  if(Number.isNaN(d.getTime()))return String(value);
  return d.toLocaleString("ko-KR",{
    year:"numeric",month:"2-digit",day:"2-digit",
    hour:"2-digit",minute:"2-digit"
  });
}

function getConsultHistory(customer){
  const raw=customer?.consultation_history;
  if(Array.isArray(raw))return raw;
  if(typeof raw==="string"){
    try{
      const parsed=JSON.parse(raw);
      return Array.isArray(parsed)?parsed:[];
    }catch(e){return [];}
  }
  return [];
}

function renderConsultHistory(customer){
  const history=getConsultHistory(customer);
  const reversed=history.map((item,index)=>({item,index})).reverse();

  $("consultHistory").innerHTML=reversed.length
    ? reversed.map(({item,index})=>`
      <div class="history-item" data-history-index="${index}">
        <div class="history-item-head">
          <div class="time">${esc(formatDateTime(item.created_at))}</div>
          <div class="history-actions">
            <button type="button" class="history-btn edit" data-history-action="edit" data-history-index="${index}">수정</button>
            <button type="button" class="history-btn delete" data-history-action="delete" data-history-index="${index}">삭제</button>
          </div>
        </div>
        <div class="content">${esc(item.content||"")}</div>
      </div>
    `).join("")
    : '<div class="history-empty">아직 저장된 상담 기록이 없습니다.</div>';
}

function openConsultation(id){
  const customer=customers.find(c=>String(c.id)===String(id));
  if(!customer){alert("고객 정보를 찾지 못했습니다.");return;}

  activeConsultCustomerId=String(customer.id);
  $("consultName").textContent=customer.name||"-";
  $("consultPhone").textContent=customer.phone||"-";
  $("consultStatus").textContent=customer.status||"신규";
  $("consultFollowUp").textContent=customer.follow_up_date||"-";
  $("consultFollowUpInput").value=customer.follow_up_date||"";
  $("consultMemo").value="";
  editingHistoryIndex=null;
  $("consultSave").textContent="상담 기록 저장";
  renderConsultHistory(customer);

  $("consultModal").classList.add("open");
  $("consultModal").setAttribute("aria-hidden","false");
  document.body.style.overflow="hidden";
  setTimeout(()=>$("consultMemo").focus(),100);
}

function closeConsultation(){
  $("consultModal").classList.remove("open");
  $("consultModal").setAttribute("aria-hidden","true");
  document.body.style.overflow="";
  activeConsultCustomerId=null;
  editingHistoryIndex=null;
  $("consultMemo").value="";
  $("consultSave").textContent="상담 기록 저장";
}

async function saveConsultation(){
  if(!activeConsultCustomerId)return;

  const content=$("consultMemo").value.trim();
  if(!content){alert("상담 내용을 입력해주세요.");return;}

  const customer=customers.find(c=>String(c.id)===String(activeConsultCustomerId));
  if(!customer){alert("고객 정보를 찾지 못했습니다.");return;}

  const history=getConsultHistory(customer);
  let nextHistory;

  if(editingHistoryIndex!==null){
    nextHistory=history.map((item,index)=>
      index===editingHistoryIndex
        ? {...item,content,updated_at:new Date().toISOString()}
        : item
    );
  }else{
    nextHistory=[
      ...history,
      {
        created_at:new Date().toISOString(),
        content
      }
    ];
  }

  const saveBtn=$("consultSave");
  const originalText=saveBtn.textContent;
  saveBtn.disabled=true;
  saveBtn.textContent="저장 중...";

  const {error}=await db
    .from("customers")
    .update({consultation_history:nextHistory})
    .eq("id",activeConsultCustomerId);

  saveBtn.disabled=false;

  if(error){
    saveBtn.textContent=originalText;
    alert("상담 기록 저장 실패: "+error.message);
    return;
  }

  customer.consultation_history=nextHistory;
  $("consultMemo").value="";
  editingHistoryIndex=null;
  saveBtn.textContent="상담 기록 저장";
  renderConsultHistory(customer);
  alert(originalText==="수정 내용 저장"?"상담 기록이 수정되었습니다.":"상담 기록이 저장되었습니다.");
}

async function deleteConsultationHistory(index){
  if(!activeConsultCustomerId)return;

  const customer=customers.find(c=>String(c.id)===String(activeConsultCustomerId));
  if(!customer){alert("고객 정보를 찾지 못했습니다.");return;}

  const history=getConsultHistory(customer);
  const target=history[index];
  if(!target)return;

  if(!confirm("이 상담 기록을 삭제할까요?"))return;

  const nextHistory=history.filter((_,i)=>i!==index);
  const {error}=await db
    .from("customers")
    .update({consultation_history:nextHistory})
    .eq("id",activeConsultCustomerId);

  if(error){
    alert("상담 기록 삭제 실패: "+error.message);
    return;
  }

  customer.consultation_history=nextHistory;
  if(editingHistoryIndex===index){
    editingHistoryIndex=null;
    $("consultMemo").value="";
    $("consultSave").textContent="상담 기록 저장";
  }
  renderConsultHistory(customer);
  alert("상담 기록이 삭제되었습니다.");
}

function editConsultationHistory(index){
  if(!activeConsultCustomerId)return;

  const customer=customers.find(c=>String(c.id)===String(activeConsultCustomerId));
  if(!customer)return;

  const history=getConsultHistory(customer);
  const target=history[index];
  if(!target)return;

  editingHistoryIndex=index;
  $("consultMemo").value=target.content||"";
  $("consultSave").textContent="수정 내용 저장";
  $("consultMemo").focus();
  $("consultMemo").scrollIntoView({behavior:"smooth",block:"center"});
}

async function saveConsultFollowUp(){
  if(!activeConsultCustomerId)return;

  const customer=customers.find(c=>String(c.id)===String(activeConsultCustomerId));
  if(!customer){alert("고객 정보를 찾지 못했습니다.");return;}

  const nextDate=$("consultFollowUpInput").value||null;
  const button=$("consultFollowUpSave");
  const originalText=button.textContent;
  button.disabled=true;
  button.textContent="저장 중...";

  const {error}=await db
    .from("customers")
    .update({follow_up_date:nextDate})
    .eq("id",activeConsultCustomerId);

  button.disabled=false;
  button.textContent=originalText;

  if(error){
    alert("다음 연락일 저장 실패: "+error.message);
    return;
  }

  customer.follow_up_date=nextDate;
  $("consultFollowUp").textContent=nextDate||"-";
  render();
  alert("다음 연락일이 저장되었습니다.");
}

async function deleteCustomer(id){
  const c=customers.find(x=>String(x.id)===String(id));
  const customerName=c?.name||"선택한 고객";
  if(!confirm(customerName+" 정보를 삭제할까요?"))return;

  const {error}=await db.from("customers").delete().eq("id",id);
  if(error){
    alert("삭제 실패: "+error.message);
    return;
  }
  await loadCustomers();
  alert("삭제되었습니다.");
}

$("customerBody").addEventListener("click",async event=>{
  const button=event.target.closest("button[data-action]");
  if(!button)return;

  const id=button.dataset.id;
  const action=button.dataset.action;

  if(action==="edit") editCustomer(id);
  if(action==="delete") await deleteCustomer(id);
});
$("customerForm").addEventListener("submit",async e=>{
  e.preventDefault();
  const id=$("customerId").value;
  const payload={
    name:$("name").value.trim(),
    phone:$("phone").value.trim(),
    age_group:$("age").value,
    status:$("status").value,
    source:$("source").value||"CRM",
    available_time:$("availableTime").value.trim(),
    follow_up_date:$("followUp").value||null,
    interest:$("interest").value.trim(),
    contract_date:$("contractDate").value||null,
    monthly_premium:num($("monthlyPremium").value),
    commission:num($("commission").value),
    memo:$("memo").value.trim()
  };
  const res=id
    ? await db.from("customers").update(payload).eq("id",id)
    : await db.from("customers").insert(payload);

  if(res.error){
    alert("저장 실패: "+res.error.message);
  }else{
    const wasEdit=Boolean(id);
    clearForm();
    await loadCustomers();
    alert(wasEdit?"수정되었습니다.":"고객이 등록되었습니다.");
  }
});
["search","statusFilter","sourceFilter","sortBy"].forEach(id=>$(id).addEventListener("input",()=>{
  currentPage=1;
  render();
}));
$("cancelBtn").addEventListener("click",clearForm);$("newBtn").addEventListener("click",()=>{clearForm();$("name").focus()});


function getSelectedCustomers(){
  return customers.filter(c=>selectedIds.has(String(c.id)));
}

function buildMessage(selected){
  const names=selected.map(c=>c.name).filter(Boolean);
  const nameText=names.length===1?names[0]+" 고객님":"고객님";
  return `안녕하세요. ${nameText}
AI보험 미래전략사업부 김민석 사업단장입니다.

상담 신청 감사합니다.
확인 후 상담 가능 시간에 맞춰 연락드리겠습니다.

문의: 010-8795-8502`;
}

$("todayBtn").addEventListener("click",()=>{
  todayOnly=!todayOnly;
  activeStatsFilter=todayOnly?"today":"all";
  currentPage=1;

  $("todayBtn").classList.toggle("today-active",todayOnly);
  $("todayBtn").textContent=todayOnly?"전체 고객 보기":"오늘 연락 예정만 보기";

  document.querySelectorAll(".stat-filter").forEach(card=>{
    card.classList.toggle("active",card.dataset.filter===activeStatsFilter);
  });

  render();
});

$("smsBtn").addEventListener("click",()=>{
  const selected=getSelectedCustomers();
  if(!selected.length){alert("문자를 보낼 고객을 먼저 체크해주세요.");return;}

  const phones=selected.map(c=>cleanPhone(c.phone)).filter(Boolean);
  if(!phones.length){alert("선택한 고객의 휴대폰 번호가 없습니다.");return;}

  const body=encodeURIComponent(buildMessage(selected));
  const separator=/iPhone|iPad|iPod/i.test(navigator.userAgent)?"&":"?";
  location.href=`sms:${phones.join(",")}${separator}body=${body}`;
});


document.querySelectorAll(".stat-filter").forEach(card=>{
  card.addEventListener("click",()=>{
    activeStatsFilter=card.dataset.filter||"all";
    currentPage=1;

    document.querySelectorAll(".stat-filter").forEach(item=>{
      item.classList.toggle("active",item===card);
    });

    if(activeStatsFilter==="today"){
      todayOnly=true;
      $("todayBtn").classList.add("today-active");
      $("todayBtn").textContent="전체 고객 보기";
    }else{
      todayOnly=false;
      $("todayBtn").classList.remove("today-active");
      $("todayBtn").textContent="오늘 연락 예정만 보기";
    }

    render();
  });
});


$("customerBody").addEventListener("dblclick",event=>{
  if(event.target.closest("button,a,input,select,textarea"))return;
  const row=event.target.closest("tr[data-customer-id]");
  if(!row)return;
  openConsultation(row.dataset.customerId);
});

$("consultClose").addEventListener("click",closeConsultation);
$("consultCancel").addEventListener("click",closeConsultation);
$("consultSave").addEventListener("click",saveConsultation);
$("consultFollowUpSave").addEventListener("click",saveConsultFollowUp);

$("consultHistory").addEventListener("click",event=>{
  const button=event.target.closest("button[data-history-action]");
  if(!button)return;

  const index=Number(button.dataset.historyIndex);
  const action=button.dataset.historyAction;

  if(action==="edit") editConsultationHistory(index);
  if(action==="delete") deleteConsultationHistory(index);
});

$("consultModal").addEventListener("click",event=>{
  if(event.target===$("consultModal"))closeConsultation();
});

document.addEventListener("keydown",event=>{
  if(event.key==="Escape"&&$("consultModal").classList.contains("open")){
    closeConsultation();
  }
});

$("pagination").addEventListener("click",event=>{
  const btn=event.target.closest("button[data-page]");
  if(!btn||btn.disabled)return;
  currentPage=Number(btn.dataset.page);
  render();
});

$("customerBody").addEventListener("change",event=>{
  const checkbox=event.target.closest(".row-check");
  if(!checkbox)return;
  const id=String(checkbox.dataset.id);
  checkbox.checked?selectedIds.add(id):selectedIds.delete(id);
  checkbox.closest("tr")?.classList.toggle("selected-row",checkbox.checked);
  renderPagination(Math.max(1,Math.ceil(getFilteredCustomers().length/pageSize)));
  updateSelectAll(getFilteredCustomers().slice((currentPage-1)*pageSize,currentPage*pageSize));
});

$("selectAll").addEventListener("change",event=>{
  document.querySelectorAll(".row-check").forEach(checkbox=>{
    checkbox.checked=event.target.checked;
    const id=String(checkbox.dataset.id);
    event.target.checked?selectedIds.add(id):selectedIds.delete(id);
    checkbox.closest("tr")?.classList.toggle("selected-row",event.target.checked);
  });
  renderPagination(Math.max(1,Math.ceil(getFilteredCustomers().length/pageSize)));
});

document.querySelector('.stat-filter[data-filter="all"]')?.classList.add("active");
checkSession();
