<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="description" content="AI보험 미래전략사업부 보험사업설명회 참석 신청">
  <meta property="og:title" content="보험사업설명회에 당신을 초대합니다">
  <meta property="og:description" content="더 늦기 전에 새로운 기회를 준비하세요.">
  <meta property="og:image" content="/seminar-main.png">
  <title>보험사업설명회 참석 신청</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;background:#020b17;font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Noto Sans KR",Arial,sans-serif}
    body{display:flex;justify-content:center}
    .page{position:relative;width:min(100%,768px);line-height:0}
    .main-img{display:block;width:100%;height:auto}
    .hotspot{position:absolute;display:block;border:0;background:transparent;cursor:pointer;z-index:5}
    /* 이미지 안 빨간 '사업설명회 참석 신청하기' 버튼 위치 */
    .apply-hotspot{left:56.1%;top:61.25%;width:39.2%;height:4.45%}
    /* 이미지 안 노란 카카오톡 버튼 위치 */
    .kakao-hotspot{left:50.8%;top:85.15%;width:46.4%;height:5.55%}
    .bottom-apply{
      position:fixed;left:50%;bottom:0;transform:translateX(-50%);
      width:min(100%,768px);z-index:20;padding:10px 14px calc(10px + env(safe-area-inset-bottom));
      background:rgba(2,11,23,.92);backdrop-filter:blur(10px)
    }
    .bottom-apply button{
      width:100%;height:56px;border:0;border-radius:14px;background:#ffd719;
      color:#091425;font-size:18px;font-weight:900;cursor:pointer
    }
    .modal{
      display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.78);
      padding:18px;overflow:auto;align-items:center;justify-content:center
    }
    .modal.open{display:flex}
    .card{
      width:min(100%,480px);background:#fff;border-radius:22px;padding:25px 20px;
      color:#101828;line-height:1.45;box-shadow:0 24px 70px rgba(0,0,0,.4)
    }
    .card h2{margin:0 0 6px;font-size:25px;letter-spacing:-1px;text-align:center}
    .card .sub{margin:0 0 20px;color:#667085;font-size:14px;text-align:center}
    .field{margin:0 0 13px}
    .field label{display:block;margin-bottom:6px;font-size:14px;font-weight:800}
    .field input,.field select{
      display:block;width:100%;height:50px;border:1px solid #d0d5dd;border-radius:10px;
      padding:0 13px;background:#fff;color:#101828;font-size:15px;outline:none
    }
    .field input:focus,.field select:focus{border-color:#175cd3;box-shadow:0 0 0 3px rgba(23,92,211,.12)}
    .agree{display:flex;gap:8px;align-items:flex-start;margin:8px 0 16px;color:#667085;font-size:12px}
    .agree input{width:18px;height:18px;flex:0 0 auto}
    .submit{width:100%;height:54px;border:0;border-radius:11px;background:#c91018;color:#fff;font-size:17px;font-weight:900;cursor:pointer}
    .close{width:100%;margin-top:9px;height:44px;border:0;border-radius:10px;background:#eef2f6;color:#344054;font-weight:800;cursor:pointer}
    .success{
      display:none;position:fixed;inset:0;z-index:200;background:#06162c;color:#fff;
      padding:24px;align-items:center;justify-content:center;text-align:center;line-height:1.5
    }
    .success.open{display:flex}
    .success-box{width:min(100%,440px)}
    .check{width:78px;height:78px;border-radius:50%;margin:0 auto 20px;background:#ffd719;color:#07152a;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:900}
    .success h2{font-size:30px;margin:0 0 10px}
    .success p{color:#c7d2e4;margin:0 0 24px}
    .success button{width:100%;height:52px;border:0;border-radius:12px;background:#ffd719;color:#07152a;font-weight:900;font-size:16px}
    @media(max-width:520px){
      .bottom-apply{padding-left:10px;padding-right:10px}
      .bottom-apply button{height:52px;font-size:16px}
    }
  </style>
</head>
<body>
  <main class="page">
    <img class="main-img" src="seminar-main.png" alt="보험사업설명회 안내 및 참석 신청">
    <button class="hotspot apply-hotspot" aria-label="사업설명회 신청하기" onclick="openForm()"></button>
    <a class="hotspot kakao-hotspot" aria-label="카카오톡 상담 신청" href="javascript:openForm()"></a>
  </main>

  <div class="bottom-apply"><button onclick="openForm()">사업설명회 참석 신청하기</button></div>

  <div id="modal" class="modal" onclick="backdropClose(event)">
    <form id="leadForm" class="card">
      <h2>사업설명회 참석 신청</h2>
      <p class="sub">신청 내용을 확인한 후 개별 연락드리겠습니다.</p>
      <div class="field"><label for="name">이름 *</label><input id="name" name="name" required placeholder="이름을 입력해주세요"></div>
      <div class="field"><label for="phone">휴대폰 번호 *</label><input id="phone" name="phone" required inputmode="numeric" maxlength="13" placeholder="010-0000-0000"></div>
      <div class="field"><label for="age">연령대 *</label><select id="age" name="age" required><option value="">선택해주세요</option><option>20대</option><option>30대</option><option>40대</option><option>50대</option><option>기타</option></select></div>
      <div class="field"><label for="career">보험경력 *</label><select id="career" name="career" required><option value="">선택해주세요</option><option>신입</option><option>경력</option></select></div>
      <div class="field"><label for="region">지역 *</label><select id="region" name="region" required><option value="">선택해주세요</option><option>서울</option><option>경기</option><option>인천</option><option>부산</option><option>대구</option><option>대전</option><option>광주</option><option>울산</option><option>세종</option><option>강원</option><option>충북</option><option>충남</option><option>전북</option><option>전남</option><option>경북</option><option>경남</option><option>제주</option></select></div>
      <label class="agree"><input type="checkbox" required><span>사업설명회 안내 및 상담을 위한 개인정보 수집·이용에 동의합니다.</span></label>
      <button class="submit" type="submit">사업설명회 참석 신청하기</button>
      <button class="close" type="button" onclick="closeForm()">닫기</button>
    </form>
  </div>

  <section id="success" class="success">
    <div class="success-box">
      <div class="check">✓</div>
      <h2>신청이 완료되었습니다</h2>
      <p>사업설명회 참석 신청이 정상적으로 접수되었습니다.<br>담당자가 확인 후 연락드리겠습니다.</p>
      <button onclick="location.reload()">확인</button>
    </div>
  </section>

<script>
  const modal=document.getElementById('modal');
  const form=document.getElementById('leadForm');
  const success=document.getElementById('success');
  const phone=document.getElementById('phone');

  function openForm(){modal.classList.add('open');document.body.style.overflow='hidden';}
  function closeForm(){modal.classList.remove('open');document.body.style.overflow='';}
  function backdropClose(e){if(e.target===modal)closeForm();}

  phone.addEventListener('input',e=>{
    let v=e.target.value.replace(/\D/g,'').slice(0,11);
    if(v.length<4)e.target.value=v;
    else if(v.length<8)e.target.value=v.replace(/(\d{3})(\d+)/,'$1-$2');
    else e.target.value=v.replace(/(\d{3})(\d{4})(\d+)/,'$1-$2-$3');
  });

  form.addEventListener('submit',async e=>{
    e.preventDefault();
    const btn=form.querySelector('.submit');
    btn.disabled=true;btn.textContent='신청 중...';
    const payload={
      name:form.name.value.trim(),phone:form.phone.value.trim(),
      age:form.age.value,career:form.career.value,region:form.region.value,
      source:'사업설명회 컨셉1',created_at:new Date().toISOString()
    };
    try{
      /*
      실제 CRM/Supabase 저장 주소가 준비되면 아래 주석을 해제하세요.
      const res=await fetch('YOUR_API_ENDPOINT',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify(payload)
      });
      if(!res.ok)throw new Error('접수 실패');
      */
      console.log(payload);
      modal.classList.remove('open');
      success.classList.add('open');
      form.reset();
    }catch(err){
      alert('접수 중 오류가 발생했습니다. 다시 시도해주세요.');
    }finally{
      btn.disabled=false;btn.textContent='사업설명회 참석 신청하기';
    }
  });
</script>
</body>
</html>
